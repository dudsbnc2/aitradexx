version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aimastercrypto-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aimastercrypto
      - POSTGRES_USER=${POSTGRES_USER:-aimuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aimuser} -d aimastercrypto"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aimastercrypto

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimastercrypto-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aimuser}:${POSTGRES_PASSWORD}@db:5432/aimastercrypto
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CRYPTOCOMPARE_API_KEY=${CRYPTOCOMPARE_API_KEY}
      - CRYPTOPANIC_API_KEY=${CRYPTOPANIC_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AUTO_SCAN_TF=${AUTO_SCAN_TF:-1H}
      - AUTO_SCAN_INTERVAL_MINS=${AUTO_SCAN_INTERVAL_MINS:-60}
      - MIN_CONFIDENCE_ALERT=${MIN_CONFIDENCE_ALERT:-70}
      - ALLOWED_ORIGINS=https://aimastercrypto.com,http://frontend:3000
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@aimastercrypto.com}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-eduardohcorreia@hotmail.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aimastercrypto

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aimastercrypto-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://aimastercrypto.com
      - NEXT_PUBLIC_APP_URL=https://aimastercrypto.com
    depends_on:
      - backend
    networks:
      - aimastercrypto

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aimastercrypto-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aimastercrypto

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aimastercrypto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-data:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - aimastercrypto

networks:
  aimastercrypto:
    driver: bridge

volumes:
  pgdata:
  certbot-data:
  certbot-certs:
